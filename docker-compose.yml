version: "3.9"

services:
  backend:
    build: ./backend
    container_name: mediassist-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend/mediassist-ai
    container_name: mediassist-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend